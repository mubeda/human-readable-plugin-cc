<!DOCTYPE html>
<html lang="en" data-theme="{{theme_default}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<style>{{lib_katex_css}}</style>
<style id="hl-light">{{lib_highlight_light}}</style>
<style id="hl-dark" disabled>{{lib_highlight_dark}}</style>
<style>{{styles}}</style>
</head>
<body>
<header class="hr-header">
  <div class="hr-header-left">
    <button id="hr-sidebar-toggle" class="hr-icon-btn" aria-label="Toggle sidebar" title="Toggle sidebar">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="hr-title">{{title}}</h1>
  </div>
  <div class="hr-header-right">
    <span id="hr-breadcrumb" class="hr-breadcrumb"></span>
    <button id="hr-theme-toggle" class="hr-icon-btn" aria-label="Toggle theme" title="Toggle theme">
      <svg class="hr-icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="hr-icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="hr-layout">
  <aside id="hr-sidebar" class="hr-sidebar">
    <div class="hr-filter-wrap">
      <input id="hr-filter" type="search" placeholder="Filter files…" autocomplete="off" spellcheck="false">
    </div>
    <nav id="hr-tree" class="hr-tree"></nav>
  </aside>
  <main id="hr-content" class="hr-content">
    <article id="hr-article" class="hr-article"></article>
  </main>
</div>

<script id="hr-tree-data" type="application/json">{{tree_json}}</script>
<script id="hr-content-data" type="application/json">{{content_json}}</script>
<script id="hr-meta-data" type="application/json">{{meta_json}}</script>

<script>{{lib_marked}}</script>
<script>{{lib_highlight_js}}</script>
<script>{{lib_katex_js}}</script>
<script>{{lib_katex_auto_render}}</script>
<script>{{lib_mermaid}}</script>
<script>{{app_js}}</script>
</body>
</html>
